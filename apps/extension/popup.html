<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Secretary</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafaf9;
        --fg: #0c0a09;
        --fg-muted: #57534e;
        --surface: #ffffff;
        --border: #e7e5e4;
        --accent: #4338ca;
        --accent-soft: #e0e7ff;
        --error: #b91c1c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0a09;
          --fg: #fafaf9;
          --fg-muted: #a8a29e;
          --surface: #1c1917;
          --border: #292524;
          --accent: #818cf8;
          --accent-soft: #312e81;
          --error: #f87171;
        }
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        width: 360px;
        min-height: 240px;
      }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 { font-size: 14px; font-weight: 600; margin: 0; }
      header .host {
        font-size: 11px;
        color: var(--fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      main { padding: 16px; }
      .empty {
        font-size: 13px;
        color: var(--fg-muted);
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--fg-muted);
        margin-bottom: 4px;
        margin-top: 12px;
      }
      input[type='text'], input[type='password'] {
        width: 100%;
        padding: 8px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--fg);
        font-size: 13px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 8px 12px;
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border);
      }
      .integration {
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 8px;
      }
      .integration .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
      }
      .integration .label { font-weight: 500; }
      .integration .status {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--fg-muted);
      }
      .integration .status.active { color: var(--accent); }
      .integration .status.error { color: var(--error); }
      .error {
        background: var(--surface);
        border: 1px solid var(--error);
        color: var(--error);
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        margin-top: 12px;
      }
      footer {
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--fg-muted);
        display: flex;
        justify-content: space-between;
      }
      footer a { color: var(--fg-muted); text-decoration: none; }
      footer a:hover { color: var(--fg); text-decoration: underline; }
    </style>
  </head>
  <body>
    <header>
      <h1>AI Secretary</h1>
      <span class="host" id="host">—</span>
    </header>
    <main id="main"></main>
    <footer>
      <a href="https://aisecretary.app/docs" target="_blank" rel="noopener">Docs</a>
      <a href="#" id="reset-token">Reset token</a>
    </footer>
    <script src="popup.js" type="module"></script>
  </body>
</html>
