name: CodeQL

# GitHub-managed static analysis for JavaScript/TypeScript across the
# whole monorepo. Runs:
#   - on push to main
#   - on every PR targeting main
#   - weekly (Monday 06:00 UTC) so the scan re-runs against updated rule
#     sets even when the codebase is quiescent
#
# Findings surface in GitHub's Security tab → Code scanning alerts.
# Severity ≥ "Error" blocks the PR by default once the repo is public
# (this is a separate setting in repo → Settings → Code security).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds high-confidence security queries on
          # top of the default suite. `security-and-quality` would also
          # add lint-style quality queries — kept off here so the
          # signal-to-noise ratio stays high for security review.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
