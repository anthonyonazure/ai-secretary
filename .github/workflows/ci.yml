name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tokens:
    name: design-tokens build + contrast gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build design tokens
        run: pnpm --filter @aisecretary/design-tokens build

      - name: Contrast gate (WCAG AA)
        run: pnpm --filter @aisecretary/design-tokens contrast-check

      - name: Upload contrast report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contrast-report
          path: packages/design-tokens/build/tokens.contrast-report.json

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: design-tokens-build
          path: packages/design-tokens/build/

  typecheck:
    name: typecheck (workspace)
    needs: tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore design-tokens build
        uses: actions/download-artifact@v4
        with:
          name: design-tokens-build
          path: packages/design-tokens/build/

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Provider isolation check (notifications)
        run: pnpm --filter @aisecretary/notifications check:isolation

      - name: Provider isolation check (transcription)
        run: pnpm --filter @aisecretary/transcription check:isolation

      - name: Provider isolation check (llm-gateway)
        run: pnpm --filter @aisecretary/llm-gateway check:isolation

      - name: Provider isolation check (bot)
        run: pnpm --filter @aisecretary/bot check:isolation

      - name: Audit-coverage check (api)
        run: pnpm --filter @aisecretary/api check:audit-coverage

      - name: Telemetry registry check (shared)
        run: pnpm --filter @aisecretary/shared check:telemetry

      - name: Citation-required check (modules)
        run: pnpm --filter @aisecretary/modules check:citations

      - name: Test
        run: pnpm test

  e2e:
    name: e2e (playwright)
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore design-tokens build
        uses: actions/download-artifact@v4
        with:
          name: design-tokens-build
          path: packages/design-tokens/build/

      - name: Install Playwright browsers
        run: pnpm --filter @aisecretary/e2e exec playwright install --with-deps chromium webkit

      - name: Run Playwright tests
        run: pnpm e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
