<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph card — 1200×630 (Facebook/Twitter/LinkedIn standard).
  Used as a social preview when the GitHub repo URL is shared.
  Light-mode only by design — most social previews render against
  a fixed white-ish background.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title">
  <title id="title">AI Secretary — meeting intelligence + decision platform</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#eeeef0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- top-left mark -->
  <g transform="translate(72 64)">
    <rect x="0" y="0" width="48" height="60" rx="2" fill="#ffffff" stroke="#09090b" stroke-width="2"/>
    <line x1="7" y1="0" x2="7" y2="60" stroke="#09090b" stroke-width="2" opacity=".5"/>
    <rect x="34" y="0" width="5" height="28" fill="#4f46e5"/>
    <polygon points="34,28 39,28 36.5,33" fill="#4f46e5"/>
    <text x="72" y="40" font-family="ui-sans-serif,-apple-system,system-ui,sans-serif"
          font-size="22" font-weight="600" letter-spacing="-0.5" fill="#09090b">AI Secretary</text>
  </g>

  <!-- accent eyebrow -->
  <g transform="translate(72 200)">
    <line x1="0" y1="0" x2="56" y2="0" stroke="#4f46e5" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="-12" font-family="ui-sans-serif,-apple-system,system-ui,sans-serif"
          font-size="13" font-weight="500" letter-spacing="2.5" fill="#4f46e5" opacity=".9">PORTFOLIO PROJECT</text>
  </g>

  <!-- big title -->
  <text x="72" y="288" font-family="ui-sans-serif,-apple-system,system-ui,sans-serif"
        font-size="68" font-weight="600" letter-spacing="-2" fill="#09090b">Meetings, handled.</text>

  <!-- subtitle (two lines) -->
  <text font-family="ui-sans-serif,-apple-system,system-ui,sans-serif" font-size="24" fill="#52525b" letter-spacing="-0.2">
    <tspan x="72" y="350">Multi-tenant SaaS reference implementation —</tspan>
    <tspan x="72" y="386">capture, transcribe, analyze, share. HIPAA + GDPR + SOC 2.</tspan>
  </text>

  <!-- stats row -->
  <g font-family="ui-sans-serif,-apple-system,system-ui,sans-serif" fill="#09090b">
    <g transform="translate(72 466)">
      <text font-size="36" font-weight="600" letter-spacing="-1">1,715</text>
      <text font-size="14" y="32" fill="#52525b" letter-spacing="0.5">TESTS PASSING</text>
    </g>
    <g transform="translate(232 466)">
      <text font-size="36" font-weight="600" letter-spacing="-1">19</text>
      <text font-size="14" y="32" fill="#52525b" letter-spacing="0.5">PACKAGES</text>
    </g>
    <g transform="translate(330 466)">
      <text font-size="36" font-weight="600" letter-spacing="-1">8</text>
      <text font-size="14" y="32" fill="#52525b" letter-spacing="0.5">VERTICALS</text>
    </g>
    <g transform="translate(412 466)">
      <text font-size="36" font-weight="600" letter-spacing="-1">6</text>
      <text font-size="14" y="32" fill="#52525b" letter-spacing="0.5">ADRs</text>
    </g>
  </g>

  <!-- right-side composition: open notebook -->
  <g transform="translate(720 224)">
    <ellipse cx="170" cy="270" rx="200" ry="10" fill="#6e6e76" opacity=".12"/>
    <!-- left page -->
    <path d="M0 0 L160 -8 L160 220 L0 228 Z" fill="#ffffff" stroke="#09090b" stroke-width="2"/>
    <!-- right page -->
    <path d="M160 -8 L320 0 L320 228 L160 220 Z" fill="#ffffff" stroke="#09090b" stroke-width="2"/>
    <line x1="160" y1="-8" x2="160" y2="220" stroke="#09090b" stroke-width="1.5" opacity=".55"/>
    <!-- left content -->
    <line x1="20" y1="32" x2="118" y2="28" stroke="#09090b" stroke-width="2" opacity=".7"/>
    <line x1="20" y1="56" x2="138" y2="54" stroke="#09090b" stroke-width="1.5" opacity=".5"/>
    <line x1="20" y1="76" x2="124" y2="74" stroke="#09090b" stroke-width="1.5" opacity=".5"/>
    <line x1="20" y1="96" x2="146" y2="94" stroke="#09090b" stroke-width="1.5" opacity=".5"/>
    <rect x="20" y="124" width="6" height="44" fill="#4f46e5"/>
    <line x1="36" y1="138" x2="138" y2="136" stroke="#09090b" stroke-width="2" opacity=".85"/>
    <line x1="36" y1="156" x2="118" y2="155" stroke="#09090b" stroke-width="1.5" opacity=".5"/>
    <line x1="36" y1="174" x2="98" y2="173" stroke="#09090b" stroke-width="1.5" opacity=".5"/>
    <!-- right content (action items) -->
    <g transform="translate(176 30)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#ffffff" stroke="#09090b" stroke-width="1.5"/>
      <line x1="24" y1="7" x2="120" y2="6" stroke="#09090b" stroke-width="1.5" opacity=".5"/>
      <rect x="0" y="26" width="14" height="14" rx="2" fill="#4f46e5"/>
      <path d="M3 33 L6 36 L11 30" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="24" y1="33" x2="124" y2="32" stroke="#09090b" stroke-width="1.5" opacity=".4"/>
      <rect x="0" y="52" width="14" height="14" rx="2" fill="#ffffff" stroke="#09090b" stroke-width="1.5"/>
      <line x1="24" y1="59" x2="108" y2="58" stroke="#09090b" stroke-width="1.5" opacity=".5"/>
      <rect x="0" y="78" width="14" height="14" rx="2" fill="#ffffff" stroke="#09090b" stroke-width="1.5"/>
      <line x1="24" y1="85" x2="132" y2="84" stroke="#09090b" stroke-width="1.5" opacity=".5"/>
      <rect x="0" y="104" width="14" height="14" rx="2" fill="#ffffff" stroke="#09090b" stroke-width="1.5"/>
      <line x1="24" y1="111" x2="100" y2="110" stroke="#09090b" stroke-width="1.5" opacity=".5"/>
    </g>
  </g>

  <!-- bottom-right URL chip -->
  <text x="1128" y="582" text-anchor="end" font-family="ui-monospace,SFMono-Regular,monospace"
        font-size="14" fill="#52525b" letter-spacing="0.3">github.com/anthonyonazure/ai-secretary</text>
</svg>
